name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            clang-tidy \
            lua5.4 \
            luarocks
          sudo luarocks install luacheck

      - name: Check C/C++ formatting
        run: |
          if [ -n "$(find . -name '*.c' -o -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror 2>&1)" ]; then
            echo "Code is not formatted with clang-format"
            exit 1
          fi

      - name: Run clang-tidy
        run: |
          find . -name '*.cpp' -print0 | xargs -0 -n1 clang-tidy || true

      - name: Run Lua lint
        run: |
          luacheck .